<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Discord Code Watcher</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 12px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h1 { font-size: 14px; margin: 0 0 12px; font-weight: 600; }
    label { display: block; font-size: 11px; color: #aaa; margin: 8px 0 4px; }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px 7px;
      font-size: 12px;
      font-family: monospace;
    }
    .status {
      margin-top: 12px;
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #aaa;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .dot.connected { background: #089981; }
    .dot.disconnected { background: #c0392b; }
    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Discord Code Watcher</h1>

  <label for="channelId">Channel ID</label>
  <input type="text" id="channelId" placeholder="z.B. 1344026694691848274">

  <label for="codePattern">Code-Regex (optional)</label>
  <input type="text" id="codePattern" placeholder="LBOX-[A-Z0-9]{18}">

  <label for="watchUser">Bild-Watch User (User-ID empfohlen)</label>
  <input type="text" id="watchUser" placeholder="z.B. 1503164139391029300">

  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:8px">
    <input type="checkbox" id="watchAll" style="width:auto"> Alle Bilder im Channel checken
  </label>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusLabel">Bridge: —</span>
  </div>

  <p class="hint">
    <b>Bild-Watch User:</b> Reine Zahl = Discord-User-ID (stabil, empfohlen — Rechtsklick auf User → „Nutzer-ID kopieren", Dev-Modus an). Text = Anzeigename (ändert sich wenn er sich umbenennt!).<br>
    Channel ID: Rechtsklick auf Channel → „ID kopieren".
  </p>

  <script src="popup.js"></script>
</body>
</html>
